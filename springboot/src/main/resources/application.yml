server:
  port: 9094
  servlet:
    context-path: /
  tomcat:
    max-threads: 200
    min-spare-threads: 10

spring:
  application:
    name: smart-agriculture
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 云端部署时修改为实际数据库地址
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart-agriculture}?characterEncoding=utf8&useSSL=false&serverTimezone=UTC&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis:
  type-aliases-package: com.farmland.intel.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志配置
logging:
  level:
    com.farmland.intel: info
    org.springframework.web: warn
    org.mybatis: warn
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/smart-agriculture.log
    max-size: 10MB
    max-history: 30

# 文件上传配置
files:
  upload:
    # 云端部署时使用环境变量 UPLOAD_PATH 或默认相对路径
    path: ${UPLOAD_PATH:./uploads}
    allowed-types: jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx
    max-size: 100MB

# 高德地图API配置
amap:
  js-key: ${AMAP_JS_KEY:}
  web-key: ${AMAP_WEB_KEY:}
  city: ${AMAP_CITY:430800}

# CORS配置
cors:
  allowed-origins: "http://localhost:8080,http://127.0.0.1:8080,http://localhost:8087,http://127.0.0.1:8087"

# 通义千问AI配置（智能Agent）
qwen:
  api-key: ${QWEN_API_KEY:}
  api-url: ${QWEN_API_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation}
  model: ${QWEN_MODEL:qwen-max}

# OneNET物联网平台配置（STM32硬件）
onenet:
  api-url: ${ONENET_API_URL:https://iot-api.heclouds.com}
  author-key: ${ONENET_AUTHOR_KEY:}
  user-id: ${ONENET_USER_ID:470386}
  version: ${ONENET_VERSION:2022-05-01}
  product-id: ${ONENET_PRODUCT_ID:CzL61ga8FI}
  device-name: ${ONENET_DEVICE_NAME:d1}
  enabled: ${ONENET_ENABLED:true}

websocket:
  enabled: ${WEBSOCKET_ENABLED:true}

fruit-detect:
  api-url: ${FRUIT_DETECT_API_URL:http://localhost:5000/api/detect}
  health-url: ${FRUIT_DETECT_HEALTH_URL:http://localhost:5000/api/health}
