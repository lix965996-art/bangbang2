server:
  port: 9094
  servlet:
    context-path: /

spring:
  application:
    name: smart-agriculture-platform
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  cloud:
    bus:
      enabled: false
    config:
      enabled: false
    function:
      scan:
        enabled: false
      ineligible-definitions: inMemorySwaggerResourcesProvider
    stream:
      function:
        autodetect: false
    service-registry:
      auto-registration:
        enabled: false
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
        namespace: agriculture
        group: DEFAULT_GROUP
    gateway:
      enabled: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        - id: device-service
          uri: lb://device-service
          predicates:
            - Path=/api/device/**
        - id: purchase-service
          uri: lb://purchase-service
          predicates:
            - Path=/api/purchase/**
        - id: sales-service
          uri: lb://sales-service
          predicates:
            - Path=/api/sales/**
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
        - id: online-sale-service
          uri: lb://online-sale-service
          predicates:
            - Path=/api/online-sale/**
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/api/ai/**
        - id: monitoring-service
          uri: lb://monitoring-service
          predicates:
            - Path=/api/monitoring/**
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart-agriculture}?characterEncoding=utf8&useSSL=false&serverTimezone=UTC&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 30000

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true

# 日志配置
logging:
  level:
    com.farmland.intel: info
    org.springframework.web: warn
    org.mybatis: warn
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/smart-agriculture.log
    max-size: 10MB
    max-history: 30

# 文件上传配置
files:
  upload:
    path: ${UPLOAD_PATH:./uploads}
    allowed-types: jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx
    max-size: 100MB

# 高德地图API配置
amap:
  js-key: ${AMAP_JS_KEY:}
  web-key: ${AMAP_WEB_KEY:}
  city: ${AMAP_CITY:430800}

# CORS配置
cors:
  allowed-origins: "http://localhost:8080,http://127.0.0.1:8080,http://localhost:8087,http://127.0.0.1:8087"

# 通义千问AI配置（智能Agent）
qwen:
  api-key: ${QWEN_API_KEY:}
  api-url: ${QWEN_API_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation}
  model: ${QWEN_MODEL:qwen-max}

# OneNET物联网平台配置（STM32硬件）
onenet:
  api-url: ${ONENET_API_URL:https://iot-api.heclouds.com}
  author-key: ${ONENET_AUTHOR_KEY:}
  user-id: ${ONENET_USER_ID:470386}
  version: ${ONENET_VERSION:2022-05-01}
  product-id: ${ONENET_PRODUCT_ID:CzL61ga8FI}
  device-name: ${ONENET_DEVICE_NAME:d1}
  enabled: ${ONENET_ENABLED:true}

websocket:
  enabled: ${WEBSOCKET_ENABLED:true}

fruit-detect:
  api-url: ${FRUIT_DETECT_API_URL:http://localhost:5000/api/detect}
  health-url: ${FRUIT_DETECT_HEALTH_URL:http://localhost:5000/api/health}

# Eureka配置
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EUREKA_HOST:localhost}
    prefer-ip-address: true

# 网关配置
zuul:
  routes:
    user-service:
      path: /api/user/**
      serviceId: user-service
    device-service:
      path: /api/device/**
      serviceId: device-service
    purchase-service:
      path: /api/purchase/**
      serviceId: purchase-service
    sales-service:
      path: /api/sales/**
      serviceId: sales-service
    inventory-service:
      path: /api/inventory/**
      serviceId: inventory-service
    online-sale-service:
      path: /api/online-sale/**
      serviceId: online-sale-service
    ai-service:
      path: /api/ai/**
      serviceId: ai-service
    monitoring-service:
      path: /api/monitoring/**
      serviceId: monitoring-service

# 安全配置
security:
  oauth2:
    resource:
      jwt:
        key-value: ${JWT_SECRET:your-secret-key}
        authorities-key: authorities
        user-name-key: user_name

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
    serviceregistry:
      enabled: false
